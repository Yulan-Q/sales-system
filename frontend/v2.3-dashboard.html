<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企业级 AI 外销系统 v2.3 - 数据可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    
    .header { background: white; border-radius: 10px; padding: 20px 30px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .header h1 { color: #667eea; margin-bottom: 5px; }
    .header p { color: #666; font-size: 0.9em; }
    
    .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card h2 { color: #333; margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
    
    /* 统计卡片 */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; }
    .stat-card h3 { font-size: 2em; margin-bottom: 5px; }
    .stat-card p { opacity: 0.9; font-size: 0.85em; }
    .stat-card.emails { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .stat-card.campaigns { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    
    /* 图表网格 */
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; }
    .chart-container { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .chart-container h3 { color: #667eea; margin-bottom: 15px; }
    .chart { width: 100%; height: 350px; }
    
    /* 漏斗图容器 */
    .funnel-container { grid-column: 1 / -1; }
    
    /* 标签 */
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 500; display: inline-block; }
    .badge-new { background: #e3fcef; color: #00a854; }
    .badge-contacted { background: #e6f7ff; color: #1890ff; }
    .badge-interested { background: #fff7e6; color: #fa8c16; }
    .badge-qualified { background: #f9f0ff; color: #722ed1; }
    
    /* 表格 */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; color: #333; font-weight: 600; }
    tr:hover { background: #f8f9fa; }
    
    /* 加载动画 */
    .loading { text-align: center; padding: 40px; color: #667eea; font-size: 1.2em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 企业级 AI 外销系统 v2.3 - 数据可视化</h1>
      <p>🆕 线索趋势 | 国家分布 | 转化漏斗 | 邮件效果分析</p>
    </div>

    <div id="app"><div class="loading">正在加载数据...</div></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    let token = null;

    async function init() {
      try {
        // 登录
        const loginRes = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: 'admin', password: 'admin123' })
        });
        const loginData = await loginRes.json();
        if (!loginData.success) throw new Error('登录失败');
        token = loginData.token;

        // 并行获取所有数据
        const [statsRes, trendRes, countryRes, industryRes, funnelRes, emailRes, scoreRes, leadsRes] = await Promise.all([
          fetch(`${API_BASE}/dashboard/stats`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_BASE}/analytics/lead-trend?days=30`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_BASE}/analytics/country-distribution`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_BASE}/analytics/industry-distribution`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_BASE}/analytics/conversion-funnel`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_BASE}/analytics/email-performance`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_BASE}/analytics/score-distribution`, { headers: { 'Authorization': `Bearer ${token}` } }),
          fetch(`${API_BASE}/leads`, { headers: { 'Authorization': `Bearer ${token}` } })
        ]);

        const stats = (await statsRes.json()).data;
        const trend = (await trendRes.json()).data;
        const country = (await countryRes.json()).data;
        const industry = (await industryRes.json()).data;
        const funnel = (await funnelRes.json()).data;
        const email = (await emailRes.json()).data;
        const score = (await scoreRes.json()).data;
        const leads = (await leadsRes.json()).data;

        render(stats, trend, country, industry, funnel, email, score, leads);
      } catch (error) {
        document.getElementById('app').innerHTML = `<div class="card"><h2>❌ 错误</h2><p style="color:red">${error.message}</p></div>`;
      }
    }

    function render(stats, trend, country, industry, funnel, email, score, leads) {
      const html = `
        <!-- 统计卡片 -->
        <div class="card">
          <h2>📊 数据统计</h2>
          <div class="stats-grid">
            <div class="stat-card">
              <h3>${stats.leads.total}</h3>
              <p>总线索数</p>
            </div>
            <div class="stat-card">
              <h3>${stats.leads.new}</h3>
              <p>新线索</p>
            </div>
            <div class="stat-card">
              <h3>${stats.leads.contacted}</h3>
              <p>已联系</p>
            </div>
            <div class="stat-card">
              <h3>${stats.leads.interested}</h3>
              <p>感兴趣</p>
            </div>
            <div class="stat-card">
              <h3>${stats.leads.qualified}</h3>
              <p>已转化</p>
            </div>
            <div class="stat-card emails">
              <h3>${stats.emails.openRate}%</h3>
              <p>邮件打开率</p>
            </div>
            <div class="stat-card emails">
              <h3>${stats.emails.clickRate}%</h3>
              <p>邮件点击率</p>
            </div>
            <div class="stat-card emails">
              <h3>${stats.emails.replyRate}%</h3>
              <p>邮件回复率</p>
            </div>
            <div class="stat-card campaigns">
              <h3>${stats.campaigns}</h3>
              <p>营销活动</p>
            </div>
            <div class="stat-card">
              <h3>${stats.avgScore}</h3>
              <p>平均评分</p>
            </div>
          </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-grid">
          <!-- 线索趋势图 -->
          <div class="chart-container">
            <h3>📈 线索趋势（30 天）</h3>
            <div id="trendChart" class="chart"></div>
          </div>

          <!-- 国家分布 -->
          <div class="chart-container">
            <h3>🌍 国家分布</h3>
            <div id="countryChart" class="chart"></div>
          </div>

          <!-- 行业分布 -->
          <div class="chart-container">
            <h3>🏭 行业分布</h3>
            <div id="industryChart" class="chart"></div>
          </div>

          <!-- 评分分布 -->
          <div class="chart-container">
            <h3>⭐ 线索评分分布</h3>
            <div id="scoreChart" class="chart"></div>
          </div>

          <!-- 转化漏斗 -->
          <div class="chart-container funnel-container">
            <h3>📊 转化漏斗</h3>
            <div id="funnelChart" class="chart"></div>
          </div>

          <!-- 邮件效果 -->
          <div class="chart-container">
            <h3>📧 邮件效果分析</h3>
            <div id="emailChart" class="chart"></div>
          </div>
        </div>

        <!-- 线索列表 -->
        <div class="card">
          <h2>🎯 线索列表</h2>
          <table>
            <thead>
              <tr><th>公司名称</th><th>邮箱</th><th>国家</th><th>行业</th><th>评分</th><th>状态</th></tr>
            </thead>
            <tbody>
              ${leads.map(l => `
                <tr>
                  <td>${l.name}</td>
                  <td>${l.email}</td>
                  <td>${l.country}</td>
                  <td>${l.industry}</td>
                  <td><span class="badge" style="background:${getScoreColor(l.score)};color:white;padding:2px 8px;border-radius:10px">${l.score}分</span></td>
                  <td><span class="badge badge-${l.status}">${l.status}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
      document.getElementById('app').innerHTML = html;

      // 渲染图表
      renderCharts(trend, country, industry, funnel, email, score);
    }

    function renderCharts(trend, country, industry, funnel, email, score) {
      // 线索趋势图
      const trendChart = echarts.init(document.getElementById('trendChart'));
      trendChart.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['新增线索', '已联系', '已转化'] },
        xAxis: { type: 'category', data: trend.map(d => d.date.slice(5)), axisLabel: { rotate: 45 } },
        yAxis: { type: 'value' },
        series: [
          { name: '新增线索', type: 'line', smooth: true, data: trend.map(d => d.newLeads), itemStyle: { color: '#667eea' } },
          { name: '已联系', type: 'line', smooth: true, data: trend.map(d => d.contacted), itemStyle: { color: '#4facfe' } },
          { name: '已转化', type: 'line', smooth: true, data: trend.map(d => d.qualified), itemStyle: { color: '#43e97b' } }
        ]
      });

      // 国家分布饼图
      const countryChart = echarts.init(document.getElementById('countryChart'));
      countryChart.setOption({
        tooltip: { trigger: 'item' },
        series: [{
          type: 'pie',
          radius: '60%',
          data: country.map(c => ({ value: c.count, name: c.country })),
          emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
        }]
      });

      // 行业分布柱状图
      const industryChart = echarts.init(document.getElementById('industryChart'));
      industryChart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: industry.map(i => i.industry), axisLabel: { rotate: 30 } },
        yAxis: { type: 'value' },
        series: [{ type: 'bar', data: industry.map(i => i.count), itemStyle: { color: '#f093fb' } }]
      });

      // 评分分布环形图
      const scoreChart = echarts.init(document.getElementById('scoreChart'));
      scoreChart.setOption({
        tooltip: { trigger: 'item' },
        series: [{
          type: 'pie',
          radius: ['40%', '70%'],
          data: [
            { value: score.A, name: 'A 级 (80-100)' },
            { value: score.B, name: 'B 级 (60-79)' },
            { value: score.C, name: 'C 级 (40-59)' },
            { value: score.D, name: 'D 级 (0-39)' }
          ],
          label: { formatter: '{b}\n{c}条' }
        }]
      });

      // 转化漏斗图
      const funnelChart = echarts.init(document.getElementById('funnelChart'));
      funnelChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c}条 ({d}%)' },
        series: [{
          type: 'funnel',
          left: '10%',
          top: 20,
          bottom: 20,
          width: '80%',
          min: 0,
          max: funnel.stages[0].value,
          minSize: '0%',
          maxSize: '100%',
          sort: 'descending',
          gap: 2,
          label: { show: true, position: 'inside', formatter: '{b}: {c}条' },
          data: funnel.stages.map(s => ({ value: s.value, name: s.name }))
        }]
      });

      // 邮件效果雷达图
      const emailChart = echarts.init(document.getElementById('emailChart'));
      emailChart.setOption({
        tooltip: {},
        radar: {
          indicator: [
            { name: '已发送', max: email.total },
            { name: '已打开', max: email.total },
            { name: '已点击', max: email.total },
            { name: '已回复', max: email.total }
          ]
        },
        series: [{
          type: 'radar',
          data: [{
            value: [email.total, email.byStatus.opened || 0, email.byStatus.clicked || 0, email.byStatus.replied || 0],
            name: '邮件效果'
          }]
        }]
      });

      // 响应式调整
      window.addEventListener('resize', () => {
        trendChart.resize();
        countryChart.resize();
        industryChart.resize();
        scoreChart.resize();
        funnelChart.resize();
        emailChart.resize();
      });
    }

    function getScoreColor(score) {
      if (score >= 80) return '#f5576c';
      if (score >= 60) return '#00f2fe';
      if (score >= 40) return '#43e97b';
      return '#fee140';
    }

    init();
  </script>
</body>
</html>
