# Docker Compose 配置文件
version: '3.8'

services:
  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: sales-nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - sales-network
    restart: always

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: sales-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      - DATABASE_URL=${DATABASE_URL:-postgresql://sales_user:sales_password@postgres:5432/sales_db}
      - APIFY_TOKEN=${APIFY_TOKEN:-demo_token}
      - BREVO_API_KEY=${BREVO_API_KEY:-demo_key}
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    depends_on:
      - postgres
    networks:
      - sales-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: sales-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sales_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sales_password}
      - POSTGRES_DB=${POSTGRES_DB:-sales_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sales-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgAdmin 数据库管理
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sales-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@example.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - sales-network
    restart: always

networks:
  sales-network:
    driver: bridge

volumes:
  postgres_data:
  backend_logs:
  pgadmin_data:
